<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily News Japan</title>
<style>
:root {
  --bg: #f0f2f5;
  --bg-secondary: #e4e6eb;
  --card-bg: #ffffff;
  --card-bg-hover: #fafbfc;
  --text: #1a1a2e;
  --text-secondary: #65676b;
  --text-tertiary: #8a8d91;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --accent-light: #eff6ff;
  --accent-glow: rgba(37, 99, 235, 0.12);
  --border: #dddfe2;
  --border-light: #e8eaed;
  --header-bg: rgba(255,255,255,0.85);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.1);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;
  --section-top: #dc2626;
  --section-domestic: #2563eb;
  --section-international: #7c3aed;
  --section-business: #059669;
  --section-tech: #d97706;
  --section-entertainment: #ec4899;
  --section-sports: #0891b2;
  --section-other: #6b7280;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg: #18191a;
  --bg-secondary: #242526;
  --card-bg: #242526;
  --card-bg-hover: #2d2e2f;
  --text: #e4e6eb;
  --text-secondary: #b0b3b8;
  --text-tertiary: #8a8d91;
  --accent: #4f8ff7;
  --accent-hover: #6da3f9;
  --accent-light: #1a2a4a;
  --accent-glow: rgba(79, 143, 247, 0.15);
  --border: #3e4042;
  --border-light: #3a3b3c;
  --header-bg: rgba(24,25,26,0.9);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
  -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  background: var(--header-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  transition: background var(--transition), border-color var(--transition);
}

.header-inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 14px 20px 12px;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}

.header-meta {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-right: auto;
  padding-left: 12px;
}

/* Icon Button (shared style for toggle buttons) */
.icon-btn {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  width: 36px;
  height: 36px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all var(--transition);
  color: var(--text-secondary);
}

.icon-btn:hover {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--accent);
  transform: scale(1.05);
}

.icon-btn .icon {
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Refresh Button */
.refresh-btn {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  padding: 7px 14px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all var(--transition);
  font-weight: 500;
}

.refresh-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}

.refresh-btn.loading { opacity: 0.6; pointer-events: none; }
.refresh-btn.loading .refresh-icon { animation: spin 1s linear infinite; }

@keyframes spin { to { transform: rotate(360deg); } }

/* Date Navigation */
.date-nav {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 2px;
  scrollbar-width: none;
}
.date-nav::-webkit-scrollbar { display: none; }

.date-tab {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border);
  background: var(--card-bg);
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
  color: var(--text-secondary);
  font-weight: 500;
}

.date-tab:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}

.date-tab.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
  box-shadow: 0 2px 8px var(--accent-glow);
}

/* Container & Content */
.container { max-width: 720px; margin: 0 auto; padding: 0 20px; }

.content {
  padding: 16px 0 40px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Loading / Error / Empty States */
.state-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}

.state-msg .icon { font-size: 48px; margin-bottom: 16px; }
.state-msg .title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.state-msg .desc { font-size: 13px; }

.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

/* Progress bar */
.progress-wrap {
  width: 200px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 0;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s ease;
  width: 0%;
}

/* News Meta */
.news-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 8px;
}

.news-date-label {
  font-size: 14px;
  color: var(--text);
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}

.news-date-label .sub {
  font-weight: 400;
  font-size: 12px;
  color: var(--text-tertiary);
}

.stats-bar {
  display: flex;
  gap: 12px;
  font-size: 12px;
  color: var(--text-tertiary);
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--bg-secondary);
  padding: 3px 10px;
  border-radius: var(--radius-full);
  font-weight: 500;
}

/* Category Filter */
.category-filter {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

.cat-chip {
  font-size: 12px;
  padding: 5px 13px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border);
  background: var(--card-bg);
  cursor: pointer;
  transition: all var(--transition);
  color: var(--text-secondary);
  font-weight: 500;
}

.cat-chip:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.cat-chip.active {
  background: var(--accent-light);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}

/* Section */
.section {
  margin-bottom: 22px;
  animation: slideUp 0.35s ease both;
}

.section:nth-child(2) { animation-delay: 0.05s; }
.section:nth-child(3) { animation-delay: 0.1s; }
.section:nth-child(4) { animation-delay: 0.15s; }
.section:nth-child(5) { animation-delay: 0.2s; }

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border-light);
}

.section-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 11px;
  border-radius: var(--radius-full);
  color: white;
  letter-spacing: 0.3px;
}

.section-count {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-left: auto;
  font-weight: 500;
}

/* Article Card */
.article-card {
  background: var(--card-bg);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin-bottom: 8px;
  transition: all var(--transition);
  cursor: default;
  position: relative;
}

.article-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 12px;
  bottom: 12px;
  width: 3px;
  border-radius: 2px;
  background: var(--card-accent, var(--accent));
  opacity: 0;
  transition: opacity var(--transition);
}

.article-card:hover {
  background: var(--card-bg-hover);
  box-shadow: var(--shadow-md);
  border-color: transparent;
  transform: translateY(-1px);
}

.article-card:hover::before { opacity: 1; }

.article-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 5px;
  line-height: 1.55;
  letter-spacing: -0.01em;
}

.article-summary {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.75;
}

/* Footer */
.footer {
  text-align: center;
  padding: 24px 0 40px;
  font-size: 12px;
  color: var(--text-tertiary);
  border-top: 1px solid var(--border-light);
}

/* Mobile */
@media (max-width: 480px) {
  .header-inner { padding: 12px 16px; }
  .header h1 { font-size: 16px; }
  .header-meta { display: none; }
  .date-tab { padding: 5px 12px; font-size: 12px; }
  .article-card { padding: 12px 14px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <h1>Daily News Japan</h1>
      <span class="header-meta" id="headerMeta"></span>
      <div class="header-actions">
        <button class="icon-btn" onclick="toggleTheme()" title="テーマ切り替え">
          <span class="icon" id="themeIcon">🌙</span>
        </button>
        <button class="refresh-btn" onclick="loadData()">
          <span class="refresh-icon">↻</span> 更新
        </button>
      </div>
    </div>
    <div class="date-nav" id="dateNav"></div>
  </div>
</div>

<div class="container">
  <div class="content" id="content">
    <div class="state-msg">
      <div class="spinner"></div>
      <div class="desc">ニュースを読み込んでいます...</div>
    </div>
  </div>
</div>

<script>
// Theme
let currentTheme = 'light';

function toggleTheme() {
  currentTheme = currentTheme === 'light' ? 'dark' : 'light';
  applyTheme();
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', currentTheme);
  const icon = document.getElementById('themeIcon');
  icon.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
  icon.style.transform = 'rotate(360deg)';
  setTimeout(() => { icon.style.transform = ''; }, 400);
}

// State
let newsData = {};
let dateList = [];
let currentDate = null;
let currentCat = 'all';

// Section colors
const SECTION_COLORS = {
  'トップニュース': 'var(--section-top)',
  'トップ': 'var(--section-top)',
  '国内': 'var(--section-domestic)',
  '社会': 'var(--section-domestic)',
  '国際': 'var(--section-international)',
  '経済・ビジネス': 'var(--section-business)',
  '経済': 'var(--section-business)',
  'ビジネス': 'var(--section-business)',
  'テクノロジー': 'var(--section-tech)',
  'テクノロジー / その他': 'var(--section-tech)',
  'テクノロジー・その他': 'var(--section-tech)',
  'エンタメ': 'var(--section-entertainment)',
  'エンターテインメント': 'var(--section-entertainment)',
  'スポーツ': 'var(--section-sports)',
};

function getSectionColor(name) {
  for (const [key, color] of Object.entries(SECTION_COLORS)) {
    if (name.includes(key) || key.includes(name)) return color;
  }
  return 'var(--section-other)';
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// Data loading
async function loadData() {
  const refreshBtn = document.querySelector('.refresh-btn');
  refreshBtn.classList.add('loading');

  try {
    document.getElementById('content').innerHTML = `
      <div class="state-msg">
        <div class="spinner"></div>
        <div class="desc">インデックスを取得中...</div>
      </div>`;

    const res = await fetch('data/index.json');
    if (!res.ok) throw new Error('index.json not found');
    const idx = await res.json();
    dateList = idx.dates.sort((a, b) => b.localeCompare(a));

    const total = dateList.length;
    document.getElementById('content').innerHTML = `
      <div class="state-msg">
        <div class="spinner"></div>
        <div class="desc" id="loadingText">ニュースを読み込み中... (0/${total})</div>
        <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
      </div>`;

    newsData = {};
    for (let i = 0; i < dateList.length; i++) {
      const pct = Math.round(((i + 1) / total) * 100);
      const loadingText = document.getElementById('loadingText');
      const progressBar = document.getElementById('progressBar');
      if (loadingText) loadingText.textContent = `ニュースを読み込み中... (${i + 1}/${total})`;
      if (progressBar) progressBar.style.width = pct + '%';

      try {
        const r = await fetch('data/' + dateList[i] + '.json');
        if (r.ok) newsData[dateList[i]] = await r.json();
      } catch (e) {
        console.warn('Failed to load:', dateList[i], e);
      }
    }

    dateList = dateList.filter(d => newsData[d]);

    if (!dateList.length) {
      showState('empty');
      return;
    }

    currentDate = dateList[0];
    document.getElementById('headerMeta').textContent = dateList.length + '日分のニュース';
    renderDateNav();
    renderNews();
  } catch (e) {
    showState('error', e.message);
  } finally {
    refreshBtn.classList.remove('loading');
  }
}

function showState(type, msg) {
  const el = document.getElementById('content');
  if (type === 'empty') {
    el.innerHTML = '<div class="state-msg"><div class="icon">📭</div><div class="title">ニュースがありません</div><div class="desc">まだデータが追加されていません。</div></div>';
  } else if (type === 'error') {
    el.innerHTML = '<div class="state-msg"><div class="icon">⚠️</div><div class="title">読み込みエラー</div><div class="desc">' + (msg || 'データの取得に失敗しました') + '</div></div>';
  }
}

function renderDateNav() {
  const nav = document.getElementById('dateNav');
  const wd = ['日','月','火','水','木','金','土'];
  nav.innerHTML = dateList.map(d => {
    const dt = new Date(d + 'T00:00:00');
    const label = (dt.getMonth()+1) + '/' + dt.getDate() + ' (' + wd[dt.getDay()] + ')';
    const active = d === currentDate ? 'active' : '';
    return `<button class="date-tab ${active}" onclick="selectDate('${d}')">${label}</button>`;
  }).join('');
}

function selectDate(d) {
  currentDate = d;
  currentCat = 'all';
  renderDateNav();
  renderNews();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectCat(c) {
  currentCat = c;
  renderNews();
}

function renderNews() {
  const news = newsData[currentDate];
  if (!news) return;

  const dt = new Date(news.date + 'T00:00:00');
  const wd = ['日','月','火','水','木','金','土'];
  const dateLabel = dt.getFullYear() + '年' + (dt.getMonth()+1) + '月' + dt.getDate() + '日 (' + wd[dt.getDay()] + ')';
  const totalArticles = news.sections.reduce((s, sec) => s + sec.articles.length, 0);

  const filtered = currentCat === 'all' ? news.sections : news.sections.filter(s => s.name === currentCat);

  let h = '';

  // Meta
  h += `<div class="news-meta">`;
  h += `<div class="news-date-label">📅 ${dateLabel}${news.timestamp ? `<span class="sub">取得: ${esc(news.timestamp)}</span>` : ''}</div>`;
  h += `<div class="stats-bar">
    <span class="stat-item">📄 ${totalArticles}件</span>
    <span class="stat-item">📂 ${news.sections.length}カテゴリ</span>
  </div>`;
  h += `</div>`;

  // Category filter
  h += `<div class="category-filter">`;
  h += `<button class="cat-chip ${currentCat === 'all' ? 'active' : ''}" onclick="selectCat('all')">すべて</button>`;
  for (const s of news.sections) {
    const active = currentCat === s.name ? 'active' : '';
    h += `<button class="cat-chip ${active}" onclick="selectCat('${esc(s.name)}')">${esc(s.name)} (${s.articles.length})</button>`;
  }
  h += `</div>`;

  // Sections
  for (const sec of filtered) {
    const color = getSectionColor(sec.name);
    h += `<div class="section">`;
    h += `<div class="section-header">
      <span class="section-badge" style="background:${color}">${esc(sec.name)}</span>
      <span class="section-count">${sec.articles.length}件</span>
    </div>`;

    for (const art of sec.articles) {
      h += `<div class="article-card" style="--card-accent:${color}">
        <div class="article-title">${esc(art.title)}</div>
        <div class="article-summary">${esc(art.summary)}</div>
      </div>`;
    }

    h += `</div>`;
  }

  h += `<div class="footer">Powered by Claude Cowork — 毎朝自動更新</div>`;
  document.getElementById('content').innerHTML = h;
}

// Init
applyTheme();
loadData();
</script>
</body>
</html>
